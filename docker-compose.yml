#
# Postgres: mismo major que el contenido del volumen (ej. volumen viejo PG15 ⇢ usar 15).
# Subida de versión ⇒ backup + volumen nuevo o pg_upgrade oficial.
services:
  backend:
    build: .
    ports:
      - "8010:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h 127.0.0.1 -p 5432 -U \"$${POSTGRES_USER}\" -d postgres"
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s

volumes:
  postgres_data:
