# Producción / VPS / patrón tipo Coolify: solo la API; PostgreSQL externo vía DATABASE_URL en `.env`.
# Compose usa el `.env` del proyecto para sustituir ${DATABASE_URL}; no monta código fuente.
# Uso: docker compose -f docker-compose.prod.yml up -d --build
services:
  backend:
    build: .
    ports:
      - "8010:8010"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:?Definir DATABASE_URL en .env o en el entorno}
    restart: unless-stopped
